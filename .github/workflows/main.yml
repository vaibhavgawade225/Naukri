name: Naukri Daily Automation

on:
  schedule:
    # ~4:21 AM IST (Current)
    - cron: '51 22 * * *'
    
    # ~6:15 AM IST (New)
    - cron: '45 0 * * *'
    
    # ~10:14 AM IST (Current)
    - cron: '44 4 * * *'
    
    # ~12:00 PM IST (New)
    - cron: '30 6 * * *'
    
    # ~3:26 PM IST (Current)
    - cron: '56 9 * * *'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies + Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable  # Ubuntu Chrome[web:32]
          pip install --upgrade pip
          pip install selenium selenium-stealth python-dotenv webdriver-manager
          
      - name: Create output dir
        run: mkdir -p output
      
      - name: Execute Script
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
          CURRENT_CTC: ${{ secrets.CURRENT_CTC }}
          EXPECTED_CTC: ${{ secrets.EXPECTED_CTC }}
          NOTICE_PERIOD: ${{ secrets.NOTICE_PERIOD }}
          EXPERIENCE: ${{ secrets.EXPERIENCE }}
        run: python apply_and_refresh.py
        
      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug-${{ github.run_id }}
          path: |
            output/*.png
            ./*.log
          retention-days: 7
