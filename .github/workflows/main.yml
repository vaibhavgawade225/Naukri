name: Naukri Daily Automation

on:
  schedule:
    - cron: '21 0 * * *' # ~6 AM IST
    - cron: '26 11 * * *' # ~5 PM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install selenium selenium-stealth
      - name: Execute Script
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
        run: python apply_and_refresh.py
