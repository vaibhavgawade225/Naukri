name: Naukri Daily Automation

on:
  schedule:
    # ~4:21 AM IST
    - cron: '51 22 * * *'
    # ~6:15 AM IST
    - cron: '45 0 * * *'
    # ~10:14 AM IST
    - cron: '44 4 * * *'
    # ~12:00 PM IST
    - cron: '30 6 * * *'
    # ~3:26 PM IST
    - cron: '56 9 * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # This caches your dependencies so 'pip install' is instant next time

      - name: Install dependencies
        run: pip install selenium selenium-stealth google-generativeai webdriver-manager

      - name: Run Apply Script
        env:
          NAUKRI_USER: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASS: ${{ secrets.NAUKRI_PASSWORD }}
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python apply_and_refresh.py
