name: Naukri Daily Automation

on:
  schedule:
    # ~4:21 AM IST (Current)
    - cron: '51 22 * * *'
    
    # ~6:15 AM IST (New)
    - cron: '45 0 * * *'
    
    # ~10:14 AM IST (Current)
    - cron: '44 4 * * *'
    
    # ~12:00 PM IST (New)
    - cron: '30 6 * * *'
    
    # ~3:26 PM IST (Current)
    - cron: '56 9 * * *'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Execute Script
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
        run: python apply_and_refresh.py
      
      # THIS SECTION ADDS THE SCREENSHOTS
      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-apply-debug
          path: ./*.png  # Added ./ to ensure it looks in the current directory
