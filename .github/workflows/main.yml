name: Naukri Daily Automation

on:
  schedule:
    # ~4:21 AM IST (22:51 UTC) - 1.5 hours earlier than before
    - cron: '51 22 * * *'
    
    # ~10:14 AM IST (04:44 UTC) - 1.5 hours earlier than before
    - cron: '44 4 * * *'
    
    # ~3:26 PM IST (09:56 UTC) - 1.5 hours earlier than before
    - cron: '56 9 * * *'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install selenium selenium-stealth
      - name: Execute Script
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
        run: python apply_and_refresh.py
      
      # THIS SECTION ADDS THE SCREENSHOTS
      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-apply-debug
          path: ./*.png  # Added ./ to ensure it looks in the current directory
