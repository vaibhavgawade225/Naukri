name: Naukri Daily Automation

on:
  schedule:
    # 6:12 AM IST (00:42 UTC)
    - cron: '42 0 * * *'
    # 12:18 PM IST (06:48 UTC)
    - cron: '48 6 * * *'
    # 5:24 PM IST (11:54 UTC)
    - cron: '54 11 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install selenium selenium-stealth
      - name: Execute Script
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
        run: python apply_and_refresh.py
      
      # THIS SECTION ADDS THE SCREENSHOTS
      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-apply-debug
          path: "*.png"
