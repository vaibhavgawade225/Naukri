name: Naukri Daily Automation

on:
  schedule:
    - cron: '30 3 * * 1-5'    # 9:00 AM IST
    - cron: '0 5 * * 1-5'     # 10:30 AM IST
    - cron: '30 6 * * 1-5'    # 12:00 PM IST
    - cron: '0 8 * * 1-5'     # 1:30 PM IST
    - cron: '30 9 * * 1-5'    # 3:00 PM IST
    - cron: '0 11 * * 1-5'    # 4:30 PM IST
    - cron: '30 12 * * 1-5'   # 6:00 PM IST
    - cron: '45 14 * * 1-5'   # 8:15 PM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install selenium selenium-stealth webdriver-manager

      - name: Run Bot
        env:
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
        run: python apply_and_refresh.py

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug-logs
          path: logs/
          retention-days: 1
